# ============================================================
# DRL Adaptive Beamforming — 64D Raw SAC Baseline
# ============================================================

antenna:
  n_rows: 8
  n_cols: 8
  frequency_hz: 10.0e9        # X-band radar
  element_spacing: 0.5         # in wavelengths (λ/2)

target:
  max_speed: 300.0             # m/s (~Mach 0.88)
  max_acceleration: 50.0       # m/s² (~5G maneuver)
  acceleration_std: 30.0       # m/s² — Singer model σ_a
  correlation_time: 2.0        # seconds — Singer model τ
  initial_range_min: 5000.0    # meters
  initial_range_max: 15000.0   # meters
  altitude_min: 1000.0         # meters
  altitude_max: 10000.0        # meters
  azimuth_range_deg: 120.0     # ±60° from boresight
  elevation_range_deg: 60.0    # ±30° from boresight

environment:
  dt: 0.01                     # 10ms time step (100 Hz)
  episode_length: 500          # steps per episode (5 seconds)
  action_mode: "raw"           # 64D BLACK-BOX MODE
  parametric_type: "absolute"  
  elevation_max_deg: 60.0
  azimuth_max_deg: 60.0
  reward:
    gain_weight: 1.0
    error_penalty: 0.45
    lock_bonus: 0.55
    lock_streak_bonus: 0.25
    low_gain_penalty: 1.0          # Increased from 0.35
    side_lobe_penalty: 2.0         # NEW: Punish defocused tracking
    improvement_bonus: 0.05
    smoothness_penalty: 0.03
    gain_shaping_power: 0.75
    streak_cap_steps: 50
    smoothness_relief_when_locked: 0.75
    reward_clip_min: -1.5
    reward_clip_max: 2.5
  success:
    min_gain: 0.85
    max_error_deg: 5.0
    min_locked_fraction: 0.8
    enable_track_loss_termination: false
    track_loss_error_deg: 20.0
    track_loss_steps: 100

training:
  algorithm: "SAC"
  device: "cuda"

  # ── Parallelism ───────────────────────────────────────────
  n_envs: 20
  vec_env_type: "subproc"
  env_seed: 42

  # ── Training budget ──────────────────────────────────────
  total_timesteps: 10000000    # 10 Million steps to give 64D a fair chance

  # ── SAC hyperparameters ──────────────────────────────────
  learning_rate: 3.0e-4
  buffer_size: 1000000
  batch_size: 256
  ent_coef: "auto"
  gamma: 0.99
  tau: 0.005
  train_freq: 1
  gradient_steps: 1
  net_arch: [256, 256, 128]     # Same architecture as 2D model

  # ── Evaluation ───────────────────────────────────────────
  eval_freq: 100000             # Less frequent evals due to 10M length
  n_eval_episodes: 10
  checkpoint_freq: 500000       # Checkpoint every 500k
  log_freq: 50
  csv_flush_freq: 1000
  save_best_by_gain: true
  log_dir: "logs/sac_raw_64d/"
  model_dir: "models/sac_raw_64d/"

dashboard:
  websocket_host: "localhost"
  websocket_port: 8765
  stream_freq: 10
  update_rate_hz: 30
