# ============================================================
# DRL Adaptive Beamforming — Default Configuration
# ============================================================

antenna:
  n_rows: 8
  n_cols: 8
  frequency_hz: 10.0e9        # X-band radar
  element_spacing: 0.5         # in wavelengths (λ/2)

target:
  max_speed: 300.0             # m/s (~Mach 0.88)
  max_acceleration: 50.0       # m/s² (~5G maneuver)
  acceleration_std: 30.0       # m/s² — Singer model σ_a
  correlation_time: 2.0        # seconds — Singer model τ
  initial_range_min: 5000.0    # meters
  initial_range_max: 15000.0   # meters
  altitude_min: 1000.0         # meters
  altitude_max: 10000.0        # meters
  azimuth_range_deg: 120.0     # ±60° from boresight
  elevation_range_deg: 60.0    # ±30° from boresight

environment:
  dt: 0.01                     # 10ms time step (100 Hz)
  episode_length: 500          # steps per episode (5 seconds) — always ends by truncation
  action_mode: "parametric"    # "parametric" or "raw"
  parametric_type: "incremental" # "absolute" or "incremental"
  max_angular_step_deg: 2.0    # maximum step size in degrees per step (incremental mode)
  elevation_max_deg: 60.0      # surveillance limits for elevation mapping (from boresight)
  azimuth_max_deg: 60.0        # surveillance limits for azimuth mapping (±60 deg from boresight)
  reward:
    # Lock-prioritized shaping (see src/utils/reward.py)
    gain_weight: 1.0
    error_penalty: 0.45
    lock_bonus: 0.55             # large bonus each step while locked on target
    lock_streak_bonus: 0.25      # extra for sustained lock (caps at streak_cap_steps)
    low_gain_penalty: 0.35       # hinge below lock threshold — no free reward without illumination
    improvement_bonus: 0.05      # small; tightly clipped
    smoothness_penalty: 0.03
    gain_shaping_power: 0.75     # gain^p — stronger peak emphasis than sqrt
    error_sensitivity: 4.0
    streak_cap_steps: 50         # full streak bonus after 0.5s continuous lock
    smoothness_relief_when_locked: 0.75
    reward_clip_min: -1.5
    reward_clip_max: 2.5
  success:
    min_gain: 0.85               # same thresholds as reward "locked" definition
    max_error_deg: 5.0
    min_locked_fraction: 0.8
    enable_track_loss_termination: false
    track_loss_error_deg: 20.0
    track_loss_steps: 100

training:
  algorithm: "SAC"
  device: "cuda"
  n_envs: 10
  vec_env_type: "subproc"
  env_seed: 42
  total_timesteps: 3000000
  learning_rate: 3.0e-4
  batch_size: 256
  buffer_size: 1000000
  gamma: 0.99
  tau: 0.005
  train_freq: 1
  gradient_steps: 1
  ent_coef: "auto"
  net_arch: [256, 256, 128]
  eval_freq: 50000
  n_eval_episodes: 20
  checkpoint_freq: 100000
  log_freq: 100
  csv_flush_freq: 2000
  save_best_by_gain: true
  log_dir: "logs/"
  model_dir: "models/"

dashboard:
  websocket_host: "localhost"
  websocket_port: 8765
  stream_freq: 5
  update_rate_hz: 30
